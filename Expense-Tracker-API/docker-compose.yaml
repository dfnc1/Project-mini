services:
  app:
    build: .
    container_name: api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - app_network

  db:
    image: postgres:15.17
    container_name: db
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: extrackapi
    volumes:
      - extrackapi:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d expense_tracker" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

volumes:
  extrackapi:

networks:
  app_network:
    driver: bridge